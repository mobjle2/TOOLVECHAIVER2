<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title> TOOLVECHAIVER2</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<style>

/* =====================================================
   🔥 TOOLVECHAI PRO CORE SYSTEM
===================================================== */

:root{
  --bg:#020617;
  --card:#0b1220;
  --border:#1e293b;

  --text:#e2e8f0;
  --muted:#94a3b8;

  --vip:#ffffff;
  --ram:#38bdf8;

  --radius:14px;
}

/* ================= GLOBAL ================= */

body{
  background:
    radial-gradient(circle at 80% 20%, rgba(59,130,246,.25), transparent 40%),
    linear-gradient(160deg,#020617,#010409);

  color:var(--text);
  font-family:Poppins,system-ui;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    repeating-linear-gradient(
      90deg,
      transparent,
      transparent 130px,
      rgba(56,189,248,.04) 131px
    );
}

/* ================= GRID ================= */

.result-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:30px;
  max-width:1100px;
  margin:auto;
}

@media(max-width:1200px){
  .result-grid{
    grid-template-columns:repeat(2,1fr);
  }
}

@media(max-width:768px){
  .result-grid{
    grid-template-columns:1fr;
  }
}

/* ================= CARD ================= */

.result-card{
  background:
    linear-gradient(
      145deg,
      rgba(11,18,32,.9),
      rgba(2,6,23,.85)
    );

  border-radius:20px;
  padding:22px;

  border:1px solid var(--border);

  backdrop-filter:blur(14px);

  box-shadow:
    0 20px 60px rgba(0,0,0,.9),
    inset 0 0 20px rgba(255,255,255,.03);

  transition:.35s cubic-bezier(.4,0,.2,1);
}

.result-card:hover{
  transform:translateY(-6px);
  border-color:#38bdf8;
  box-shadow:
    0 30px 90px rgba(0,0,0,.95),
    0 0 25px rgba(56,189,248,.15);
}

/* ================= CODE BADGE ================= */

.code-badge{
  display:inline-flex;
  align-items:center;
  padding:6px 16px;
  border-radius:12px;
  background:#020617;
  border:1px solid #334155;
  font-weight:600;
}

/* ================= HARDWARE ROW ================= */

.chip-vip-line{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:12px;
}

/* =====================================================
   ⭐ BADGE SYSTEM (VIP + RAM)
===================================================== */

.badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;

  height:28px;
  min-width:74px;
  padding:0 14px;

  border-radius:12px;
  font-size:13px;
  font-weight:700;
  letter-spacing:.3px;

  white-space:nowrap;
}

/* VIP */
.vip-badge{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.12);
}

/* RAM */
.ram-badge{
  background:rgba(56,189,248,.12);
  color:var(--ram);
  border:1px solid rgba(56,189,248,.35);
  box-shadow:
    inset 0 0 8px rgba(56,189,248,.15),
    0 0 10px rgba(56,189,248,.25);
}

/* ================= VIP COLORS ================= */

.vip-1{color:#94a3b8;}
.vip-2{color:#64748b;}
.vip-3{color:#a78bfa;}
.vip-4{color:#c084fc;}
.vip-5{color:#00e5ff;}
.vip-6{color:#00ff88;}
.vip-7{color:#ff9f1c;}
.vip-8{color:#8b5cf6;}
.vip-9{color:#ff4ecd;}
.vip-10{color:#facc15;}
.vip-11{color:#ef4444;}
.vip-12{color:#dc2626;}
.vip-13{color:#ff003c;}

/* Glow */
.vip-5::after,
.vip-6::after,
.vip-7::after,
.vip-8::after,
.vip-9::after,
.vip-10::after{
  content:"";
  position:absolute;
  inset:-6px;
  filter:blur(14px);
  opacity:.35;
  z-index:-1;
}

.vip-5::after{background:#00e5ff;}
.vip-6::after{background:#00ff88;}
.vip-7::after{background:#ff9f1c;}
.vip-8::after{background:#8b5cf6;}
.vip-9::after{background:#ff4ecd;}
.vip-10::after{background:#facc15;}

/* ================= CHIP INFO ================= */

.chip-line{
  display:flex;
  gap:16px;
  margin-top:12px;
  font-size:14px;
}

/* ================= MOBILE ================= */

@media(max-width:640px){

  .result-card{
    padding:14px;
    border-radius:16px;
  }

  .badge{
    height:26px;
    font-size:12px;
  }
}

/* =====================================================
   🔐 LOGIN SYSTEM
===================================================== */

.login-wrapper{
  position:fixed;
  inset:0;
  z-index:9999;

  display:flex;
  justify-content:center;
  align-items:center;

  background:
    radial-gradient(circle at 15% 20%, rgba(59,130,246,.25), transparent 40%),
    linear-gradient(160deg,#020617,#0f172a);
}

.login-box{
  width:420px;
  padding:55px 45px;
  border-radius:24px;

  background:
    linear-gradient(
      145deg,
      rgba(15,23,42,.95),
      rgba(2,6,23,.9)
    );

  border:1px solid rgba(56,189,248,.15);

  backdrop-filter:blur(25px);

  box-shadow:
    0 60px 140px rgba(0,0,0,.95),
    0 0 40px rgba(56,189,248,.1);

  transition:.4s;
}

.login-title{
  font-size:40px;
  font-weight:800;
  letter-spacing:4px;
  text-align:center;
  margin-bottom:30px;
}

/* ================= INPUT ================= */

.input-group{
  position:relative;
  margin-bottom:20px;
}

.input-group input{
  background:#0a1324;
  border:1px solid rgba(56,189,248,.15);
}

.input-group input:focus{
  border-color:#38bdf8;
  box-shadow:
    0 0 0 3px rgba(56,189,248,.2),
    0 0 20px rgba(56,189,248,.3);
}

.input-icon{
  position:absolute;
  left:16px;
  top:50%;
  transform:translateY(-50%);
  color:#facc15;
}

.toggle-pass{
  position:absolute;
  right:16px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
}

/* ================= LOGIN BUTTON ================= */

.login-box button{
  width:100%;
  height:50px;

  border:none;
  border-radius:14px;

  background:linear-gradient(90deg,#2563eb,#3b82f6);

  font-weight:700;
  cursor:pointer;

  transition:.3s;
}

.login-box button:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 25px rgba(37,99,235,.4);
}

.login-error{
  margin-top:12px;
  color:#f87171;
  font-size:13px;
}

/* =====================================================
   ⚙ ADMIN PANEL
===================================================== */

.admin-panel{
  max-width:1150px;
  margin:30px auto 0 auto;
}

.admin-top-bar{
  display:flex;
  align-items:center;
  gap:15px;
}

/* ===== ADMIN TOGGLE BUTTON ===== */

.admin-toggle-btn{
  display:flex;
  align-items:center;
  gap:8px;

  padding:8px 18px;
  border-radius:999px;

  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);

  cursor:pointer;
  transition:.3s;
}

.admin-toggle-btn:hover{
  border-color:#38bdf8;
}

/* =====================================================
   🔎 SEARCH BAR
===================================================== */

.clean-check{
  position:relative;
  flex:1;
}

.clean-check input{
  width:100%;
  height:52px;

  padding:0 50px 0 18px;
  border-radius:14px;

  background:#0b1220;
  border:1px solid #1e293b;

  color:white;
  font-size:14px;

  transition:.25s;
}

.clean-check input:focus{
  border-color:#38bdf8;
  box-shadow:0 0 0 3px rgba(56,189,248,.25);
  outline:none;
}

.clean-check .check-btn{
  position:absolute;
  right:8px;
  top:50%;
  transform:translateY(-50%);

  height:36px;
  width:36px;

  border:none;
  border-radius:10px;

  background:#1e293b;
  color:#94a3b8;

  cursor:pointer;
  transition:.25s;
}

.clean-check .check-btn:hover{
  background:#2563eb;
  color:white;
}

/* =====================================================
   📂 ADMIN ACCORDION
===================================================== */

#adminContent{
  max-height:0;
  overflow:hidden;
  opacity:0;
  transform:translateY(-8px);

  transition:
    max-height .4s ease,
    opacity .3s ease,
    transform .3s ease;
}

#adminContent.open{
  max-height:3000px;
  opacity:1;
  transform:translateY(0);
}

/* =====================================================
   📱 ADMIN MOBILE
===================================================== */

@media(max-width:768px){

  .admin-top-bar{
    flex-direction:column;
    align-items:stretch;
  }

  .admin-toggle-btn{
    position:fixed;
    bottom:22px;
    right:18px;

    width:52px;
    height:52px;

    justify-content:center;
    border-radius:50%;

    background:linear-gradient(135deg,#2563eb,#3b82f6);
    border:none;
    color:white;
    z-index:9999;
  }

}
/* =====================================================
   🔬 ULTRA LAB MODE FINISH
===================================================== */

/* Premium scan effect */
.result-card::after{
  content:"";
  position:absolute;
  top:0;
  left:-120%;
  width:120%;
  height:100%;
  background:linear-gradient(
    120deg,
    transparent,
    rgba(56,189,248,.25),
    transparent
  );
  transition:1.2s ease;
}

.result-card:hover::after{
  left:120%;
}

/* Appear animation */
.result-card{
  animation:cardFadeIn .5s ease forwards;
  opacity:0;
}

@keyframes cardFadeIn{
  from{
    transform:translateY(20px);
    opacity:0;
  }
  to{
    transform:translateY(0);
    opacity:1;
  }
}

/* =====================================================
   📊 PROGRESS SYSTEM
===================================================== */

.progress-wrapper{
  margin-top:20px;
  padding:18px;
  background:rgba(255,255,255,.03);
  border-radius:14px;
  border:1px solid var(--border);
}

.progress-title{
  font-size:14px;
  margin-bottom:10px;
  opacity:.8;
}

.progress-bar{
  width:100%;
  height:10px;
  background:rgba(255,255,255,.08);
  border-radius:10px;
  overflow:hidden;
}

.progress-fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00f5a0,#00d9ff);
  border-radius:10px;
  transition:width .3s ease;
}

.progress-percent{
  margin-top:8px;
  font-size:13px;
  opacity:.7;
  text-align:right;
}

/* =====================================================
   📱 FINAL MOBILE POLISH
===================================================== */

@media(max-width:640px){

  .login-box{
    width:90%;
    padding:30px 20px;
    border-radius:18px;
  }

  .login-title{
    font-size:26px;
    margin-bottom:20px;
  }

  .clean-check input{
    height:44px;
    font-size:13px;
  }

  .chip-vip-line{
    flex-wrap:wrap;
    gap:8px;
  }

  .badge{
    min-width:auto;
    padding:0 12px;
  }

}

/* =====================================================
   🌍 LANGUAGE SWITCH
===================================================== */

.lang-switch{
  margin-top:10px;
  text-align:center;
}

.lang-switch button{
  border:none;
  background:#1f2937;
  color:white;
  padding:6px 10px;
  margin:0 4px;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
  transition:.25s;
}

.lang-switch button:hover{
  background:#2563eb;
}

/* =====================================================
   💡 CLEAN TEXT OVERRIDE
===================================================== */

.result-card,
.result-card *{
  color:#e2e8f0;
}
/* =====================================
   ✅ MAIN LAYOUT FIX
===================================== */

.main-container{
  max-width:1100px;
  margin:0 auto;
  padding:40px 20px;
}

/* center title */
.title{
  text-align:center;
  margin-top:40px;
}

/* center search */
.clean-check{
  max-width:900px;
  margin:25px auto 0 auto;
}

/* admin không đẩy layout */
.admin-panel{
  max-width:1100px;
  margin:25px auto;
}


   
</style>


</head>

<body>
<!-- =====================================================
ADMIN UI STABLE BUILD — READ BEFORE EDIT
Layout đã ổn định.
Không sửa grid hoặc .link-card.
Chỉ nâng cấp logic JS hoặc màu sắc.
===================================================== -->

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-wrapper">
  <div class="login-box">

    <!-- USER -->
    <div class="input-group">
      <span class="input-icon">👤</span>

    <!-- PASS -->
    <div class="input-group">
      <span class="input-icon">🔒</span>

      <span class="toggle-pass" onclick="togglePassword()">👁</span>
    </div>

    <button onclick="secureLogin()" data-i18n="login">
ĐĂNG NHẬP
</button>
    <div id="loginError" class="login-error">Sai tài khoản!</div>
  </div>
</div>


<!-- MAIN -->
<div class="main-container">

  <h2 class="main-title">TOOLVECHAIVER2</h2>

  <div class="sub-title">
    VIP • MMC • Model
  </div>

  <!-- 🌍 LANGUAGE SWITCH -->
  <div class="lang-switch">

<!-- ===== ADMIN PANEL ===== -->
<div id="adminPanel" class="admin-panel">

  <div class="admin-top-bar"
       style="max-width:1000px;margin:25px auto 0 auto;gap:15px;">

    <!-- BÊN TRÁI: ADMIN -->
    <button class="admin-toggle-btn" id="adminToggle" onclick="toggleAdmin()">
      <span class="admin-icon">⚙</span>
     <span class="admin-text" data-i18n="admin">Admin</span>
    </button>

    <!-- Ở GIỮA: INPUT -->
<div class="check-group clean-check" style="flex:1;margin:0;">
  <input id="q"
         data-i18n-placeholder="search"
         placeholder="Nhập mã hoặc model cần kiểm tra"
         autocomplete="off">

  <button class="check-btn" onclick="check()">🔍</button>
</div>
    <!-- BÊN PHẢI: TẠO LINK -->
    <button class="create-link-btn small" onclick="createLink()">
      ＋ Tạo link
    </button>

    <div id="linkList"></div>

</div>



<!-- ===== KẾT QUẢ ===== -->
<div id="out" style="margin-top:20px;"></div>

<script>


/* ===== SAFE FIREBASE INIT ===== */

const firebaseConfig = {
  apiKey: "AIzaSyClXx0V66GQHKGO0EwQc0nYNguFLc705A0",
  authDomain: "toolvechaiver2.firebaseapp.com",
  projectId: "toolvechaiver2",
  storageBucket: "toolvechaiver2.firebasestorage.app",
  messagingSenderId: "855001765940",
  appId: "1:855001765940:web:0a562c54618377aaae5261"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();

/* ⭐ QUAN TRỌNG */
const db = firebase.firestore(firebase.app());

auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);


/* ===== SAFE USER MODE DETECT ===== */

const urlParams = new URLSearchParams(window.location.search);
const isUserMode = urlParams.has("u");

/* ❗ KHÔNG logout ngay nữa */
/* auth listener phía dưới sẽ xử lý */

window.USER_LINK_ACTIVE = true;
/* ===== USER MODE (?u=) ===== */

const params = new URLSearchParams(window.location.search);
const userParam = params.get("u");

if(userParam){

  window.addEventListener("DOMContentLoaded",()=>{

    const login=document.getElementById("loginScreen");
    if(login) login.style.display="none";

    runUserMode(userParam);

  });
}


/* ===== USER MODE ENGINE (REALTIME VERSION) ===== */

async function runUserMode(id){

  try{
const out = document.getElementById("out");
    // ===== ẨN ADMIN UI =====
    document.getElementById("loginScreen")?.remove();
    document.getElementById("adminToggle")?.remove();
    document.querySelector(".create-link-btn")?.remove();
    document.getElementById("adminContent")?.remove();

    const ref = db.collection("shareLinks").doc(id);

    let countdownInterval = null;

// ===== REALTIME LISTENER =====
ref.onSnapshot(async (doc)=>{

  const out = document.getElementById("out");

  if(!doc.exists){
    showUserMessage(L("link_not_found"));
    disableCheckUI();
    return;
  }

  const data = doc.data();

  // ===== ƯU TIÊN KIỂM TRA HẾT HẠN TRƯỚC =====
  if(data.expiresAt && data.expiresAt.toDate() < new Date()){

    await ref.update({ active:false });

out.innerHTML = `
  <div style="text-align:center;padding:40px 20px;">
    <div style="font-size:18px;margin-bottom:12px;">
      ${L("link_expired")}
    </div>
    <div style="font-size:14px;margin-top:8px;">
      <a href="https://t.me/TrungGia82" target="_blank"
         style="color:#38bdf8;text-decoration:none;font-weight:600;">
        📩 @TrungGia82
      </a>
    </div>
  </div>
`;

    disableCheckUI();
    return;
  }

  // ===== SAU ĐÓ MỚI CHECK ACTIVE =====
  if(!data.active){
    showUserMessage(L("link_locked"));
    disableCheckUI();
    return;
  }

  // ===== LINK HỢP LỆ =====
  enableCheckUI();

  // ===== TĂNG VIEW (CHỈ TĂNG 1 LẦN) =====
  if(!window._viewCounted){
    await ref.update({
      views: firebase.firestore.FieldValue.increment(1)
    });
    window._viewCounted = true;
  }

// ===== COUNTDOWN =====
if(data.expiresAt){

  let box = document.getElementById("countdownBox");

  if(!box){
    box = document.createElement("div");
    box.id = "countdownBox";

    Object.assign(box.style,{
      position:"fixed",
      top:"12px",
      right:"16px",
      background:"rgba(15,23,42,0.9)",
      border:"1px solid #334155",
      borderRadius:"10px",
      padding:"8px 14px",
      fontSize:"14px",
      fontWeight:"600",
      color:"#facc15",
      zIndex:"9999"
    });

    document.body.appendChild(box);
  }

  const end = data.expiresAt.toDate();

  if(countdownInterval){
    clearInterval(countdownInterval);
  }

  // ===== HIỂN THỊ NGAY =====
  const diffNow = end - new Date();

  if(diffNow > 0){
    const d = Math.floor(diffNow / 86400000);
    const h = Math.floor((diffNow / 3600000) % 24);
    const m = Math.floor((diffNow / 60000) % 60);
    const s = Math.floor((diffNow / 1000) % 60);

    box.innerText = L("countdown")
      .replace("{d}", d)
      .replace("{h}", h)
      .replace("{m}", m)
      .replace("{s}", s);
  }

  countdownInterval = setInterval(async()=>{

    const diff = end - new Date();

    if(diff <= 0){
      clearInterval(countdownInterval);
      await ref.update({ active:false });
      box.innerText = L("link_expired");
      disableCheckUI();
      return;
    }

    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff / 3600000) % 24);
    const m = Math.floor((diff / 60000) % 60);
    const s = Math.floor((diff / 1000) % 60);

    box.innerText = L("countdown")
      .replace("{d}", d)
      .replace("{h}", h)
      .replace("{m}", m)
      .replace("{s}", s);

  },1000);
}
    });

  }catch(e){
    console.error(e);
    showUserMessage(L("access_error"));
    disableCheckUI();
  }
}
function disableCheckUI(){

  // 🔒 Đánh dấu link không còn hợp lệ
  window.USER_LINK_ACTIVE = false;

  const input = document.getElementById("q");
  const btn   = document.querySelector(".check-btn");
  const mainContainer = document.querySelector(".main-container");
  const adminPanel = document.getElementById("adminPanel");

  if(input){
    input.disabled = true;
    input.style.opacity = "0.6";
  }

  if(btn){
    btn.disabled = true;
    btn.style.opacity = "0.6";
  }

  // ===== ẨN TOÀN BỘ GIAO DIỆN =====
  if(mainContainer){
    mainContainer.style.display = "none";
  }

  if(adminPanel){
    adminPanel.style.display = "none";
  }
}

function enableCheckUI(){

  // ✅ Đánh dấu link đang hoạt động
  window.USER_LINK_ACTIVE = true;

  const input = document.getElementById("q");
  const btn   = document.querySelector(".check-btn");

  if(input){
    input.disabled = false;
    input.style.opacity = "1";
  }

  if(btn){
    btn.disabled = false;
    btn.style.opacity = "1";
  }

  // ===== HIỆN LẠI THANH SEARCH =====
  const searchBox = document.querySelector(".clean-check");
  if(searchBox){
    searchBox.style.display = "flex";
  }
}

/* ===== GLOBAL ERROR SHIELD ===== */

window.addEventListener("error",e=>{
  console.error("GLOBAL ERROR:",e.error);
});

// ===== THÊM HÀM NÀY NẾU CHƯA CÓ =====
function showUserMessage(text){
  const out = document.getElementById("out");
  if(out){
    out.innerHTML = `
      <div style="
        margin-top:40px;
        text-align:center;
        font-size:18px;
        font-weight:600;
        color:#f87171;
      ">
        ${text}
      </div>
    `;
  }
}
async function saveAlias(id,value){

  const ref = db.collection("shareLinks").doc(id);

  if(!value || !value.trim()){
    await ref.update({
      alias: firebase.firestore.FieldValue.delete()
    });
  }else{
    await ref.update({
      alias: value.trim()
    });
  }
}


function detectChip(code){

  if(!code)
    return {name:"UNKNOWN",color:"#6b7280",class:"brand-unknown"};

  code = code.toUpperCase().trim();

  if(/^K/.test(code))
    return {name:"Samsung",color:"#22c55e",class:"brand-samsung"};

  if(/^(H9|H26|H27)/.test(code))
    return {name:"SK hynix",color:"#a855f7",class:"brand-hynix"};

  if(/^(MT|NW|JY|JZ|PA)/.test(code))
    return {name:"Micron",color:"#0ea5e9",class:"brand-micron"};

  if(/^(TH|TC|TY)/.test(code))
    return {name:"Kioxia",color:"#f97316",class:"brand-kioxia"};

  if(/^(SD|SDIN|WDC)/.test(code))
    return {name:"SanDisk / WD",color:"#ef4444",class:"brand-wd"};

  if(/^(YM|YMEC)/.test(code))
    return {name:"YMTC",color:"#06b6d4",class:"brand-ymtc"};

  if(/^FS/.test(code))
    return {name:"FORESEE",color:"#10b981",class:"brand-foresee"};

  return {name:"UNKNOWN",color:"#6b7280",class:"brand-unknown"};
}

// ===== VIP RULE (ỔN ĐỊNH & CHUẨN HÓA KIỂU DỮ LIỆU) =====
function calculateVip(ram, rom){

  // =========================
  // SAFE TYPE
  // =========================
  ram = Number(ram);
  rom = Number(rom);

  if (isNaN(ram) || isNaN(rom) || ram <= 0 || rom <= 0)
    return 0;

  // =========================
  // VIP 12 — FLAGSHIP MAX
  // =========================
  if (ram >= 16 && rom >= 512)
    return 12;

  // =========================
  // VIP 11 — UFS 3.x HIGH
  // =========================
  if (ram === 12 && rom === 512)
    return 11;

  // =========================
  // VIP 10 — UFS 2.2
  // =========================
  if (ram === 12 && rom === 256)
    return 10;

  if (ram === 8 && rom === 512)
    return 10;

  // =========================
  // VIP 9 — UFS 2.1 HIGH
  // =========================
  if ([6,8,10,12].includes(ram) && rom === 256)
    return 9;

  if (ram === 12 && rom === 128)
    return 9;

  // =========================
  // VIP 8 — UFS 2.1 MID+
  // =========================
  if ([8,10].includes(ram) && rom === 128)
    return 8;

  // =========================
  // VIP 7 — UFS MID
  // =========================
  if ([4,6].includes(ram) && rom === 128)
    return 7;
  // =========================
  // VIP 6+
  if (ram === 6 && rom === 64)
   return 6.5;
  // =========================
  // VIP 6 — eMMC MID
  // =========================
  if ([4,6].includes(ram) && rom === 64)
    return 6;

  // =========================
  // VIP 5 — UFS ENTRY
  // =========================
  if ([3,4].includes(ram) && rom === 32)
    return 5;

  if (ram === 3 && rom === 64)
    return 5;

  // =========================
  // VIP 4+ — eMMC 5.1 EXTENDED
  // =========================
  if (ram === 2 && rom === 32)
    return 4.5;

  // =========================
  // VIP 4 — eMMC BASIC
  // =========================
  if (ram === 2 && rom === 16)
    return 4;

  // =========================
  // VIP 3 — eMCP BASIC
  // =========================
  if (ram === 1 && rom === 16)
    return 3;

  // =========================
  // VIP 2 — eMCP ENTRY
  // =========================
  if (ram === 2 && rom === 8)
    return 2;

  // =========================
  // VIP 1 — LEGACY
  // =========================
  if (ram === 1 && rom === 8)
    return 1;

  // =========================
  // FALLBACK
  // =========================
  return 0;
}

function getMMCLevel(rom){

  rom = Number(rom);

  if(!rom) return null;

  if(rom <= 16) return "MMC1";
  if(rom === 32) return "MMC2";
  if(rom === 64) return "MMC3";
  if(rom === 128) return "MMC4";
  if(rom >= 256) return "MMC5";

  return "MMC";
}

function decodeSamsung(code){

  const result = {
    type:"Unknown",
    ram:null,
    rom:null,
    storage:"Unknown",
    version:null,
    vip:0
  };

  if(!code) return result;

  const main = code.toUpperCase().split("-")[0];
/* =====================================================
🔥 SAMSUNG 6001 REAL ENGINE (FIX ALL COMMON MODELS)
===================================================== */

if(main.includes("6001")){

// KM3H → eMCP 6/64
if(main.startsWith("KM3H")){
return {
type:"eMCP",
storage:"eMMC 5.1",
version:"eMMC 5.1",
ram:6,
rom:64,
vip:calculateVip(6,64)
};
}

// KMDH → uMCP UFS 2.1
if(main.startsWith("KMDH")){
return {
type:"uMCP",
storage:"UFS 2.1",
version:"UFS 2.1",
ram:6,
rom:64,
vip:calculateVip(6,64)
};
}

// KMDX → eMMC 32GB
if(main.startsWith("KMDX")){
return {
type:"eMMC",
storage:"eMMC 5.1",
version:"eMMC 5.1",
ram:3,
rom:32,
vip:calculateVip(3,32)
};
}

// KMGE → eMCP 4/64
if(main.startsWith("KMGE")){
return {
type:"eMCP",
storage:"eMMC 5.1",
version:"eMMC 5.1",
ram:4,
rom:64,
vip:calculateVip(4,64)
};
}
}

  /* =====================================================
     🔥 PRIORITY FIX (SPECIAL CASE TRƯỚC TẤT CẢ)
  ===================================================== */

  // KMDV6001 = UFS 2.1 6/64
  if(main.startsWith("KMDV6001")){
    result.type="uMCP";
    result.storage="UFS 2.1";
    result.version="UFS 2.1";
    result.rom=64;
    result.ram=6;
    result.vip=calculateVip(6,64);
    return result;
  }

  /* =====================================================
     🔹 KMA (UFS 3.1)
  ===================================================== */
  if(main.startsWith("KMA")){
    result.type="uMCP";
    result.storage="UFS 3.1";
    result.version="UFS 3.1";
    result.rom=256;

    const ramMap={
      "PM":8,
      "CM":6,
      "DM":4
    };

    result.ram = ramMap[main.slice(-2)] || null;
    result.vip = calculateVip(result.ram,result.rom);
    return result;
  }

  /* =====================================================
     🔹 KMJ (UFS 2.2)
  ===================================================== */
  if(main.startsWith("KMJ")){
    result.type="uMCP";
    result.storage="UFS 2.2";
    result.version="UFS 2.2";

    if(main.includes("A001")) result.rom=256;
    else if(main.includes("A002")) result.rom=512;
    else result.rom=128;

    const ramMap={
      "RM":12,
      "JM":8,
      "CM":6,
      "DM":4
    };

    result.ram=ramMap[main.slice(-2)]||null;
    result.vip=calculateVip(result.ram,result.rom);
    return result;
  }

  /* =====================================================
     🔹 KM2 / KM5 (UFS 2.1)
  ===================================================== */
  if(/^KM[25]/.test(main)){

    result.type="uMCP";
    result.storage="UFS 2.1";
    result.version="UFS 2.1";

    const romMap={
      "KM2B":256,
      "KM2V":128,
      "KM2A":256,
      "KM5C":64,
      "KM5H":64,
      "KM5P":64,
      "KM5V":128
    };

    const model = main.substring(0,4);
    result.rom = romMap[model] || null;

    const ramMap={
      "8M":3,
      "DM":4,
      "CM":6,
      "JM":8
    };

    result.ram = ramMap[main.slice(-2)] || null;
    result.vip = calculateVip(result.ram,result.rom);
    return result;
  }

  /* =====================================================
     🔹 KM8 / KM9 (HIGH END)
  ===================================================== */
  if(main.startsWith("KM8") || main.startsWith("KM9")){

    result.type="uMCP";

    if(main.includes("9001")){
      result.storage = main.startsWith("KM9") ? "UFS 3.x" : "UFS 2.2";
      result.rom = main.includes("G") ? 512 : 256;
    }
    else if(main.includes("8001")){
      result.storage="UFS 2.2";
      result.rom=256;
    }
    else{
      result.storage="UFS 2.1";
      result.rom=128;
    }

    const ramMap={
      "JM":8,
      "MM":12,
      "RM":12,
      "SM":16
    };

    result.ram = ramMap[main.slice(-2)]||null;
    result.version=result.storage;
    result.vip=calculateVip(result.ram,result.rom);
    return result;
  }
 /* =====================================================
   🔥 SAMSUNG eMCP COMMON SERIES (FIX UNKNOWN)
===================================================== */

if(/^KMD|^KMG|^KMQ|^KMK/.test(main)){

  result.type = "eMCP";
  result.storage = "eMMC 5.1";
  result.version = "eMMC 5.1";

  if(main.includes("6001")) result.rom = 64;
  else if(main.includes("5001")) result.rom = 32;
  else if(main.includes("4001")) result.rom = 16;

  const ramMap={
    "8":3,
    "3":2,
    "4":4,
    "C":6,
    "D":6,
    "M":8
  };

  result.ram = ramMap[main[main.length-2]] || null;

  result.vip = calculateVip(result.ram,result.rom);

  return result;
}
  /* =====================================================
     🔹 KLM (eMMC 5.1)
  ===================================================== */
  if(main.startsWith("KLM")){

    const map={
      "8G":8,
      "1G":16,
      "2G":32,
      "4G":64,
      "8H":128,
      "8J":128,
      "AJ":256
    };

    for(const k in map){
      if(main.includes(k)){
        result.type="eMMC";
        result.storage="eMMC 5.1";
        result.version="eMMC 5.1";
        result.rom=map[k];
        result.vip=calculateVip(null,result.rom);
        return result;
      }
    }
  }

  /* =====================================================
     🔹 SAMSUNG eMMC LOW SERIES
  ===================================================== */

  const emmcPrefixes=[
    "KMI","KMQ","KMW","KMH",
    "KME","KMN","KMF","KMO","KMR"
  ];

  if(emmcPrefixes.some(p=>main.startsWith(p))){

    result.type="eMMC";
    result.storage="eMMC 5.1";
    result.version="eMMC 5.1";
    result.rom=main.includes("6001")?64:32;

    const ramMap={
      "3":2,
      "4":4,
      "8":3,
      "C":6,
      "D":6,
      "M":8
    };

    result.ram = ramMap[main[main.length-2]]||null;
    result.vip = calculateVip(result.ram,result.rom);
    return result;
  }

  return result;
}

// ======================================================
// SK HYNIX FULL ENGINE (FINAL - USER VIP STANDARD)
// ======================================================

function decodeHynix(code){

code = (code || "").toUpperCase().trim();

let arch="UNKNOWN";
let storage="Unknown";
let ram=null;
let rom=null;
let vip=0;


// ======================================================
// ARCH DETECT
// ======================================================
if(code.startsWith("H9TQ") || code.startsWith("H9T")){
    arch="eMCP";
    storage="eMMC 5.1";
}
else if(code.startsWith("H9HQ")){
    arch="UFS";
    storage="UFS 2.1";
}
else if(code.startsWith("H9AG")){
    arch="eMCP";
    storage="eMMC 5.1";
}
else if(code.startsWith("H9HP")){
    arch="uMCP";
    storage="UFS 2.1";
}
else if(code.startsWith("H9RT")){
    arch="UFS4";
    storage="UFS 4.0";
}


// ======================================================
// ROM MAP  (FIX DUPLICATE + MISSING)
// ======================================================
const romMap={
"15":128,
"16":128,
"17":16,
"18":16,
"19":16,
"21":256,
"22":256,
"26":32,
"27":32,
"32":4,
"52":64,
"53":64,
"64":512
};


// ======================================================
// RAM MAP (eMCP)
// ======================================================
const emcpRamMap={
"A8":1,
"AAE":1,
"ABJ":2,
"ADF":2,
"ACL":3,
"ADJ":4,
"AEJ":6,
"AFJ":8
};


// ======================================================
// DRAM RAM MAP
// ======================================================
const dramRamMap={
"A4":0.5,
"A8":1,
"AB":2,
"AC":3,
"AD":4,
"AE":6,
"AF":8,
"AG":12,
"AH":16
};


// ======================================================
// PARSE eMCP
// ======================================================
if(arch==="eMCP"){

    rom = romMap[code.substring(4,6)] ?? null;

    const ramCode = code.substring(6,9);
    ram = emcpRamMap[ramCode] ?? null;
}


// ======================================================
// PARSE UFS (H9HQ + H9AG)
// ======================================================
if(arch==="UFS"){

    // ===== ROM =====
    rom = romMap[code.substring(4,6)] ?? null;

    // ===== RAM TOKEN =====
    const ramCode = code.substring(6,8);

    const hynixUfsRamMap={
        "AC":3,
        "AD":4,
        "AE":6,
        "AF":8,
        "AG":12,
        "AH":16
    };

    ram = hynixUfsRamMap[ramCode] ?? ram;

    // ===== H9AG SPECIAL SERIES =====
    if(code.includes("DM")) ram=4;
    else if(code.includes("EM")) ram=6;
    else if(code.includes("FM")) ram=8;

    if(rom>=256)
        storage="UFS 2.1 HIGH";
}
/* ======================================================
   🔥 NEW HYNIX GEN SUPPORT (H9AG / H9QT / H9RT)
====================================================== */

// chuẩn hóa code (bỏ suffix)
const raw = code.split("-")[0];


/* =========================
/* =========================
   H9AG REAL DECODER
========================= */
if(raw.startsWith("H9AG")){

    arch="eMCP";
    storage="eMMC 5.1";

    // ===== ROM =====
    if(raw.includes("6G")) rom=16;
    else if(raw.includes("8G")) rom=32;
    else if(raw.includes("9G")) rom=64;

    // ===== RAM OLD STYLE =====
    if(raw.includes("CM")) ram=2;
    else if(raw.includes("DM")) ram=3;
    else if(raw.includes("EM")) ram=4;
    else if(raw.includes("FM")) ram=6;

    // ===== RAM DENSITY STYLE =====
    else if(raw.includes("3A")) ram=2;
    else if(raw.includes("4A")) ram=3;
    else if(raw.includes("5A")) ram=4;
    else if(raw.includes("6A")) ram=6;
}


/* =========================
   H9QT SERIES (LPDDR5 uMCP)
========================= */
if(raw.startsWith("H9QT")){

    storage="UFS 3.1";

    if(raw.includes("0G6")) rom=128;
    if(raw.includes("1G6")) rom=256;

    if(raw.includes("CN")) ram=6;
    else if(raw.includes("DN")) ram=8;
    else if(raw.includes("EN")) ram=12;
}


/* =========================
   H9RT SERIES (UFS 4.0)
========================= */
if(raw.startsWith("H9RT")){

    storage="UFS 4.0";

    if(raw.includes("1GG")) rom=256;
    if(raw.includes("2GG")) rom=512;

    if(raw.includes("M6")) ram=12;
    if(raw.includes("N6")) ram=16;
}


/* =========================
   AUTO VIP APPLY
========================= */
if(ram && rom){

    if(ram===1 && rom===8) vip=1;
    else if(ram===2 && rom===8) vip=2;
    else if(ram===1 && rom===16) vip=3;
    else if(ram===2 && rom===16) vip=4;
    else if(ram===2 && rom===32) vip=4.5;
    else if((ram===3||ram===4)&&rom===32) vip=5;
    else if((ram===4||ram===6)&&rom===64) vip=6;
    else if((ram===4||ram===6)&&rom===128) vip=7;
    else if((ram===8||ram===10)&&rom===128) vip=8;
    else if((ram>=6)&&rom===256) vip=9;
    else if((ram===12&&rom===256)||(ram===8&&rom===512)) vip=10;
    else if(ram===12&&rom===512) vip=11;
    else if(ram>=16&&rom>=512) vip=12;
}

// ======================================================
// PARSE H9HP (uMCP — FIX VIP NOT SHOW)
// ======================================================
if(arch==="uMCP"){

    // ===== ROM =====
    rom = romMap[code.substring(4,6)] ?? null;

    // ===== RAM TOKEN =====
    const ramCode = code.substring(6,8);

    const hynixUMCPRamMap={
        "AC":4,
        "AE":6,
        "AF":8,
        "AG":12,
        "AH":16
    };

    ram = hynixUMCPRamMap[ramCode] ?? null;

    storage="UFS 2.1";
}


// ======================================================
// PARSE DRAM ONLY (REAL DRAM CHIP)
// ======================================================
if(arch==="DRAM"){

    const ramCode = code.substring(6,8);
    ram = dramRamMap[ramCode] ?? null;

    rom = null; // DRAM không có ROM
}

// ======================================================
// VIP SYSTEM
// ======================================================

if(ram===1 && rom===8)
vip=1;

else if(ram===2 && rom===8)
vip=2;

else if(ram===1 && rom===16)
vip=3;

else if(ram===2 && rom===16)
vip=4;

else if(ram===2 && rom===32)
vip=4.5;

else if(storage.includes("UFS") &&
(
(ram===3 && rom===32) ||
(ram===4 && rom===32) ||
(ram===3 && rom===64)
))
vip=5;

else if(storage.includes("eMMC") &&
(ram===4 || ram===6) && rom===64)
vip=6;

else if(storage.includes("UFS") &&
(ram===4 || ram===6) && rom===128)
vip=7;

else if(storage.includes("UFS") &&
(ram===8 || ram===10) && rom===128)
vip=8;

else if(storage.includes("UFS") &&
(
(ram===6 && rom===256) ||
(ram===8 && rom===256) ||
(ram===10 && rom===256) ||
(ram===12 && rom===128)
))
vip=9;

else if(
(ram===12 && rom===256) ||
(ram===8 && rom===512)
)
vip=10;

else if(ram===12 && rom===512)
vip=11;

else if(ram>=16 && rom>=512)
vip=12;


// ======================================================
return{
arch,
storage,
ram,
rom,
vip
};

}
  
  
  
// ===== MAIN DECODER =====
function autoDecodeChip(code, dbData){

  code = code.toUpperCase().trim();
  // ===== YMTC / YMEC ENGINE =====
if(code.startsWith("YMEC")){

  let rom = null;

  if(code.includes("C6")) rom = 32;
  if(code.includes("C7")) rom = 64;
  if(code.includes("C8")) rom = 128;
  if(code.includes("C9")) rom = 256;

  return {
    type: "UFS",
    storage: "UFS",
    ram: null,
    rom: rom,
    vip: rom === 32 ? 5 :
         rom === 64 ? 6 :
         rom === 128 ? 7 :
         rom === 256 ? 8 : null
  };
}

function buildHardware(code, data){

  /* ===== PRIORITY FIREBASE ===== */
  if(
    data &&
    (
      data.vip != null ||
      data.ram != null ||
      data.rom != null
    )
  ){
    return {
      ram: data.ram ?? null,
      rom: data.rom ?? null,
      vip: data.vip ?? null,
      storage: data.storage ?? "Manual",
      type: "Manual",
      source: "firebase"
    };
  }

  /* ===== FALLBACK DECODER ===== */
  const hw = autoDecodeChip(code);

  hw.source = "decoder";

  return hw;
}

  h.storage = h.storage || "Unknown";

  /* ===== VIP RULE FIX ===== */

  if(h.storage.includes("eMMC") && h.ram<=1)
      h.vip = 1;

  else if(h.storage.includes("eMMC") && h.ram===2 && h.rom<=8)
      h.vip = 2;

  else if(h.storage.includes("eMMC") && h.ram<=1 && h.rom===16)
      h.vip = 3;

  else if(h.storage.includes("eMMC") && h.ram===2 && h.rom===16)
      h.vip = 4;

  else if(h.storage.includes("eMMC") && h.ram>=2 && h.rom===32)
      h.vip = 4.5;

  else if(h.storage.includes("UFS") &&
         ((h.ram===3 && h.rom===32) ||
          (h.ram===4 && h.rom===32) ||
          (h.ram===3 && h.rom===64)))
      h.vip = 5;

  else if(h.storage.includes("eMMC") &&
         (h.ram===4 || h.ram===6) && h.rom===64)
      h.vip = 6;

  else if(h.storage.includes("UFS") &&
         (h.ram===4 || h.ram===6) && h.rom===128)
      h.vip = 7;

  else if(h.storage.includes("UFS") &&
         (h.ram===8 || h.ram===10) && h.rom===128)
      h.vip = 8;

  else if(h.storage.includes("UFS") &&
         ((h.ram===6 && h.rom===256) ||
          (h.ram===8 && h.rom===256) ||
          (h.ram===10 && h.rom===256) ||
          (h.ram===12 && h.rom===128)))
      h.vip = 9;

  else if((h.ram===12 && h.rom===256) ||
          (h.ram===8 && h.rom===512))
      h.vip = 10;

  else if(h.ram===12 && h.rom===512)
      h.vip = 11;

  else if(h.ram>=16 && h.rom>=512)
      h.vip = 12;

  return h;
}
}
/* ===============================
   VIP AUTO BALANCE ENGINE
================================ */

function VIP_ENGINE(hw){

  const ram = Number(hw.ram)||0;
  const rom = Number(hw.rom)||0;

  let vip = 0;

  /* ===== VIP 12 ===== */
  if(ram===16 && rom===512) vip=12;

  /* ===== VIP 11 ===== */
  else if(ram===12 && rom===512) vip=11;

  /* ===== VIP 10 ===== */
  else if(
      (ram===12 && rom===256) ||
      (ram===8 && rom===512)
  ) vip=10;

  /* ===== VIP 9 ===== */
  else if(
      (ram===6 && rom===256) ||
      (ram===12 && rom===128) ||
      (ram===8 && rom===256) ||
      (ram===10 && rom===256)
  ) vip=9;

  /* ===== VIP 8 ===== */
  else if(
      (ram===8 && rom===128) ||
      (ram===10 && rom===128)
  ) vip=8;

  /* ===== VIP 7 ===== */
  else if(
      (ram===4 && rom===128) ||
      (ram===6 && rom===128)
  ) vip=7;

  /* ===== VIP 6 ===== */
  else if(
      (ram===4 && rom===64) ||
      (ram===6 && rom===64)
  ) vip=6;

  /* ===== VIP 5 ===== */
  else if(
      (ram===3 && rom===32) ||
      (ram===4 && rom===32) ||
      (ram===3 && rom===64)
  ) vip=5;

  /* ===== VIP 4+ ===== */
  else if(ram===2 && rom===32) vip=4.5;

  /* ===== VIP 4 ===== */
  else if(ram===2 && rom===16) vip=4;

  /* ===== VIP 3 ===== */
  else if(ram===1 && rom===16) vip=3;

  /* ===== VIP 2 ===== */
  else if(ram===2 && rom===8) vip=2;

  /* ===== VIP 1 ===== */
  else if(ram===1 && rom===8) vip=1;

  hw.vip = vip;

  return hw;
}

/* ===== FAST AI VIP PREDICT ===== */
function AI_VIP_PREDICT(hw, cache){

  if(!Array.isArray(cache) || cache.length === 0)
    return null;

  const ram = Number(hw?.ram);
  const rom = Number(hw?.rom);

  if(!ram || !rom) return null;

  let total = 0;
  let count = 0;

  for(const item of cache){

    if(
      Number(item.ram) === ram &&
      Number(item.rom) === rom &&
      item.vip != null
    ){
      total += Number(item.vip);
      count++;
    }
  }

  if(count === 0) return null;

  return Number((total / count).toFixed(1));
}

/* ===============================
   FORMAT PHONE MODELS CLEAN (FIXED)
================================ */
function formatSamsungModels(text){

  if(!text) return "";

  const models = text
    .replace(/32GB|64GB|128GB|256GB|512GB/gi,"")
    .split(",")
    .map(m=>m.trim())
    .filter(Boolean);

  // ===== BRAND DETECT (SAFE VERSION) =====
  const detectBrand = (m)=>{

    const t = m.toLowerCase();

    // Ưu tiên detect hãng rõ ràng trước
    if(t.includes("oppo")) return "OPPO";
    if(t.includes("vivo")) return "VIVO";
    if(t.includes("xiaomi") || t.includes("redmi") || t.includes("poco")) return "Xiaomi";
    if(t.includes("realme")) return "Realme";

    // Samsung chỉ khi có từ khóa thật
    if(t.includes("samsung") || t.includes("galaxy")) return "Samsung";

    return "Other";
  };

  const grouped = {};

  models.forEach(m=>{

    const brand = detectBrand(m);

    // Xoá tên hãng khỏi model để hiển thị gọn
    const cleanModel = m
      .replace(/samsung|galaxy|oppo|vivo|xiaomi|redmi|poco|realme/gi,"")
      .trim();

    if(!grouped[brand]) grouped[brand] = [];

    if(!grouped[brand].includes(cleanModel))
      grouped[brand].push(cleanModel);
  });

  return Object.entries(grouped)
    .map(([brand,list])=>`${brand}: ${list.join(" / ")}`)
    .join("<br>");
}

/* ===============================
   MMC SIZE DETECT
================================ */
function extractMMCSize(code){

  code = (code || "").toUpperCase();

  // ===== Samsung KLMB / KLMG REAL SIZE =====
  if(code.includes("G1")) return 16;
  if(code.includes("G2")) return 32;
  if(code.includes("G3")) return 64;
  if(code.includes("G4")) return 128;
  if(code.includes("G5")) return 256;

  return null;
}

async function loadLinks(){

  const snap = await db.collection("shareLinks").get();

  let html = "";

  snap.forEach(doc=>{

    const id = doc.id;
    const displayName =
      d.alias && d.alias.trim() !== "" ? d.alias : id;

    html += `

          <button class="icon-btn"
            style="background:${d.active?'#16a34a':'#f59e0b'};color:white"
            onclick="toggleLink('${id}',${d.active})">
            ${d.active?'🔓':'🔒'}
          </button>

          <button class="icon-btn" onclick="configExpire('${id}')">⏰</button>

          <button class="icon-btn delete"
            style="background:#dc2626;color:white"
            onclick="deleteLink('${id}')">
            🗑
          </button>

        </div>

      </div>
    `;
  });

  /* ===== RENDER LIST ===== */
  document.getElementById("linkList").innerHTML = html;


  /* ===== INLINE RENAME SAVE ===== */
  document.querySelectorAll(".editable-name").forEach(el=>{

    const id = el.dataset.id;

    el.addEventListener("keydown", e=>{
      if(e.key === "Enter"){
        e.preventDefault();
        el.blur();
      }
    });

    el.addEventListener("blur", async ()=>{

      const value = el.innerText.trim();
      const ref = db.collection("shareLinks").doc(id);

      try{
        if(!value){
          await ref.update({
            alias: firebase.firestore.FieldValue.delete()
          });
        }else{
          await ref.update({
            alias: value
          });
        }
      }catch(err){
        console.error("Rename error:",err);
      }

    });

  });


  /* ===== COUNTDOWN REALTIME ===== */

  snap.forEach(doc=>{

    const d = doc.data();
    const id = doc.id;

    if(!d.expiresAt) return;

    const end = d.expiresAt.toDate();
    const el = document.getElementById(`remain-${id}`);
    if(!el) return;

    clearInterval(window.adminTimers?.[id]);

    window.adminTimers = window.adminTimers || {};

    window.adminTimers[id] = setInterval(async ()=>{

      const diff = end - new Date();

      if(diff <= 0){

        clearInterval(window.adminTimers[id]);
        el.innerText = "⛔ Đã hết hạn";

        if(d.active){
          await db.collection("shareLinks")
            .doc(id)
            .update({active:false});
          loadLinks();
        }

        return;
      }

      const days = Math.floor(diff/86400000);
      const hours = Math.floor((diff/3600000)%24);
      const minutes = Math.floor((diff/60000)%60);
      const seconds = Math.floor((diff/1000)%60);

      el.innerText =
        `⏳ ${days}d ${hours}h ${minutes}m ${seconds}s`;

    },1000);

  });

}

function closeExpireBox(){
  const box = document.getElementById("expireBox");
  if(box) box.remove();
}

async function saveExpire(id){
  const d = parseInt(document.getElementById("expireDays").value || 0);
  const h = parseInt(document.getElementById("expireHours").value || 0);
  const m = parseInt(document.getElementById("expireMinutes").value || 0);

  if(d === 0 && h === 0 && m === 0){
    await db.collection("shareLinks").doc(id).update({
      expiresAt: null
    });
  }else{
    const future = new Date();
    future.setDate(future.getDate() + d);
    future.setHours(future.getHours() + h);
    future.setMinutes(future.getMinutes() + m);

    await db.collection("shareLinks").doc(id).update({
      expiresAt: firebase.firestore.Timestamp.fromDate(future)
    });
  }

  closeExpireBox();
  loadLinks();
}

function startRename(id){
  const el = document.getElementById("name-" + id);
  if(!el || el.querySelector("input")) return;

  const oldText = el.innerText;
  const input = document.createElement("input");

  input.type = "text";
  input.value = oldText;
  input.style.width = "100%";
  input.style.background = "transparent";
  input.style.color = "inherit";
  input.style.border = "1px solid rgba(255,255,255,0.3)";
  input.style.borderRadius = "6px";
  input.style.padding = "4px 6px";
  input.style.fontSize = "14px";

  el.innerHTML = "";
  el.appendChild(input);
  input.focus();
  input.select();

  function finish(){
    const val = input.value.trim();
    el.innerText = val || oldText;

    if(val){
      // ✅ GIỮ TÊN KỂ CẢ ĐÓNG TAB
      localStorage.setItem("alias_" + id, val);
    }
  }

  input.addEventListener("blur", finish);
  input.addEventListener("keydown", e=>{
    if(e.key === "Enter") input.blur();
    if(e.key === "Escape") el.innerText = oldText;
  });
}

function toggleAdmin(){

  const content = document.getElementById("adminContent");
  const toggleBtn = document.getElementById("adminToggle");
  const createBtn = document.querySelector(".create-link-btn");

  if(!content) return;

  const isOpen = content.classList.contains("open");

  if(isOpen){
    content.classList.remove("open");
    toggleBtn?.classList.remove("active");
    createBtn?.classList.remove("show");
  } else {
    content.classList.add("open");
    toggleBtn?.classList.add("active");
    createBtn?.classList.add("show");
  }

}

const Lang={

current:"vi",

init(){
  const saved=localStorage.getItem("lang");
  this.current=saved||"vi";
  this.apply(this.current);
},

set(lang){
  this.current=lang;
  localStorage.setItem("lang",lang);
  this.apply(lang);
},

apply(lang){

  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const key=el.dataset.i18n;
    el.innerText=I18N[lang][key];
  });

  document.querySelectorAll("[data-i18n-placeholder]").forEach(el=>{
    const key=el.dataset.i18nPlaceholder;
    el.placeholder=I18N[lang][key];
  });

}

};
