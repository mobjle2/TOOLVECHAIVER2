/* ===== ADMIN TOGGLE ULTRA PRO ===== */

.admin-toggle-btn{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 22px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(10px);
  color:#e2e8f0;
  font-weight:600;
  letter-spacing:0.5px;
  cursor:pointer;
  transition:all 0.35s cubic-bezier(.4,0,.2,1);
  position:relative;
  overflow:hidden;
}

/* Gradient glow nền */
.admin-toggle-btn::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(90deg,#2563eb,#3b82f6,#06b6d4);
  opacity:0;
  transition:0.4s;
  z-index:0;
}

.admin-toggle-btn span{
  position:relative;
  z-index:1;
}

/* Hover */
.admin-toggle-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 30px rgba(37,99,235,0.3);
}

/* Active state */
.admin-toggle-btn.active{
  color:white;
  border-color:transparent;
  box-shadow:0 15px 40px rgba(37,99,235,0.5);
}

.admin-toggle-btn.active::before{
  opacity:1;
}

/* Icon xoay */
.admin-icon{
  transition:transform 0.4s ease;
}

.admin-toggle-btn.active .admin-icon{
  transform:rotate(180deg);
}

  margin-left:auto;

}

  for(const p of PRICE_TABLE){

      pm.includes(key) ||

// ===== VIP RULE =====
function calculateVip(ram, rom){
  // =========================
  // SAFE TYPE
  // =========================
  ram = Number(ram);
  rom = Number(rom);

  if (isNaN(ram) || isNaN(rom) || ram <= 0 || rom <= 0)
    return 0;

  // =========================
  // VIP 12 — FLAGSHIP MAX
  // =========================
  if (ram >= 16 && rom >= 512)
    return 12;

  // =========================
  // VIP 11 — UFS 3.x HIGH
  // =========================
  if (ram === 12 && rom === 512)
    return 11;

  // =========================
  // VIP 10 — UFS 2.2
  // =========================
  if (ram === 12 && rom === 256)
    return 10;

  if (ram === 8 && rom === 512)
    return 10;

  // =========================
  // VIP 9 — UFS 2.1 HIGH
  // =========================
  if ([6,8,10,12].includes(ram) && rom === 256)
    return 9;

  if (ram === 12 && rom === 128)
    return 9;

  // =========================
  // VIP 8 — UFS 2.1 MID+
  // =========================
  if ([8,10].includes(ram) && rom === 128)
    return 8;

  // =========================
  // VIP 7 — UFS MID
  // =========================
  if ([4,6].includes(ram) && rom === 128)
    return 7;
  // =========================
  // VIP 6+
  if (ram === 6 && rom === 64)
   return 6.5;
  // =========================
  // VIP 6 — eMMC MID
  // =========================
  if ([4,6].includes(ram) && rom === 64)
    return 6;

  // =========================
  // VIP 5 — UFS ENTRY
  // =========================
  if ([3,4].includes(ram) && rom === 32)
    return 5;

  if (ram === 3 && rom === 64)
    return 5;

  // =========================
  // VIP 4+ — eMMC 5.1 EXTENDED
  // =========================
  if (ram === 2 && rom === 32)
    return 4.5;

  // =========================
  // VIP 4 — eMMC BASIC
  // =========================
  if (ram === 2 && rom === 16)
    return 4;

  // =========================
  // VIP 3 — eMCP BASIC
  // =========================
  if (ram === 1 && rom === 16)
    return 3;

  // =========================
  // VIP 2 — eMCP ENTRY
  // =========================
  if (ram === 2 && rom === 8)
    return 2;

  // =========================
  // VIP 1 — LEGACY
  // =========================
  if (ram === 1 && rom === 8)
    return 1;

  // =========================
  // FALLBACK
  // =========================
  return 0;
}

else if(raw.startsWith("H9RT")){
    arch="UFS";
    storage="UFS 4.0";
}

else if(raw.startsWith("H26M")){
    arch="eMMC";
    storage="eMMC";
}

else if(raw.startsWith("H28U")){
    arch="UFS";
    storage="UFS";
}

const romMap={
"17":16,
"18":16,
"19":16,
"26":32,
"27":32,
"52":64,
"53":64,

};

"AG":12,
"AH":16
};


// ======================================================
// H9TQ / H9HP PARSE
// ======================================================

if(arch==="eMCP"){

rom = romMap[raw.substring(4,6)] ?? null;

const ramCode3 = raw.substring(6,9);
const ramCode2 = raw.substring(6,8);

ram = emcpRamMap[ramCode3] ?? emcpRamMap[ramCode2] ?? null;

}


// ======================================================

// ======================================================

if(arch==="UFS" && raw.startsWith("H9HQ")){

rom = romMap[raw.substring(4,6)] ?? null;

const ufsRamMap={
"AC":3,

"AE":6,
"AF":8,

};

ram = ufsRamMap[ramCode] ?? null;

if(rom>=256)
storage="UFS 2.1 HIGH";

}


// ======================================================
// H9AG SERIES
// ======================================================

if(raw.startsWith("H9AG")){

arch="eMCP";
storage="eMMC 5.1";

if(raw.includes("6G")) rom=16;
else if(raw.includes("8G")) rom=32;
else if(raw.includes("9G")) rom=64;

if(raw.includes("CM")) ram=2;
else if(raw.includes("DM")) ram=3;
else if(raw.includes("EM")) ram=4;
else if(raw.includes("FM")) ram=6;

}


// ======================================================
// H9QT (UFS 3.1)
// ======================================================

if(raw.startsWith("H9QT")){

storage="UFS 3.1";

if(raw.includes("0G6")) rom=128;
if(raw.includes("1G6")) rom=256;

if(raw.includes("CN")) ram=6;
else if(raw.includes("DN")) ram=8;
else if(raw.includes("EN")) ram=12;

}


// ======================================================
// H9RT (UFS 4.0)
// ======================================================

if(raw.startsWith("H9RT")){

storage="UFS 4.0";

if(raw.includes("1GG")) rom=256;
if(raw.includes("2GG")) rom=512;

if(raw.includes("M6")) ram=12;
if(raw.includes("N6")) ram=16;

}


// ======================================================
// VIP ENGINE
// ======================================================

if(ram===1 && rom===8) vip=1;
else if(ram===2 && rom===8) vip=2;
else if(ram===1 && rom===16) vip=3;
else if(ram===2 && rom===16) vip=4;
else if(ram===2 && rom===32) vip=4.5;
else if((ram===3||ram===4)&&rom===32) vip=5;
else if((ram===4||ram===6)&&rom===64) vip=6;
else if((ram===4||ram===6)&&rom===128) vip=7;
else if((ram===8||ram===10)&&rom===128) vip=8;
else if((ram>=6)&&rom===256) vip=9;
else if((ram===12&&rom===256)||(ram===8&&rom===512)) vip=10;
else if(ram===12&&rom===512) vip=11;
else if(ram>=16&&rom>=512) vip=12;


// ======================================================

return{
arch,
storage,
ram,
rom,
vip
};

}

  for(const item of cache){

    if(
      Number(item.ram) === ram &&
      Number(item.rom) === rom &&
      item.vip != null
    ){
      total += Number(item.vip);
      count++;
    }
  }

  if(count === 0) return null;

  return Number((total / count).toFixed(1));
}

    if(t.includes("realme")) return "Realme";

if(t.includes("honor")) return "HONOR";
if(t.includes("meizu")) return "MEIZU";
if(t.includes("oneplus")) return "ONEPLUS";
if(t.includes("lenovo")) return "LENOVO";
if(t.includes("zte")) return "ZTE";
if(t.includes("nubia")) return "NUBIA";

if(t.includes("masstel")) return "MASSTEL";
if(t.includes("mobell")) return "MOBELL";
if(t.includes("mobiistar")) return "MOBIISTAR";
if(t.includes("bkav") || t.includes("bphone")) return "BKAV";

if(t.includes("nokia")) return "NOKIA";
if(t.includes("sony")) return "SONY";
if(t.includes("asus")) return "ASUS";
if(t.includes("tecno")) return "TECNO";
if(t.includes("infinix")) return "INFINIX";
if(t.includes("itel")) return "ITEL";
    // Samsung chỉ khi có từ khóa thật
   if(t.includes("samsung") || t.includes("galaxy")) return "SAMSUNG";

    return "Other";
  };

  const grouped = {};

  

models.forEach(m=>{

  const brand = detectBrand(m);

  // Xoá tên hãng khỏi model để hiển thị gọn
const cleanModel = m
 .replace(/(samsung|galaxy|oppo|vivo|xiaomi|redmi|poco|realme|vsmart|honor|huawei|nokia|sony|asus|lenovo|zte|nubia|meizu|oneplus|tecno|infinix|itel|masstel|mobell|mobiistar|bkav)/gi,"")
    .replace(/\s+/g," ")

  if(!cleanModel) return;

  if(!grouped[brand]) grouped[brand] = [];

  if(!grouped[brand].includes(cleanModel))

const order = [
"SAMSUNG",

return Object.entries(grouped)

/* ===============================

function extractMMCSize(code){

  code = (code || "").toUpperCase();

  if(code.includes("G1")) return 16;
  if(code.includes("G2")) return 32;
  if(code.includes("G3")) return 64;
  if(code.includes("G4")) return 128;
  if(code.includes("G5")) return 256;

  return null;
}

function chuẩnHóaModel(input){

  input = String(input || "")
    .toUpperCase()
    .trim()
    .replace("SM-","");

  /* A50 (A505) */
  const ngoặc = input.match(/\(([^)]+)\)/);
  if(ngoặc) return ngoặc[1];

  /* A51 -> A515 */
  const m = input.match(/^([A-Z])(\d{2})$/);
  if(m){
    return m[1] + m[2] + "5";
  }

  return input;
}

el.innerText =

async function saveExpire(id){
  const d = parseInt(document.getElementById("expireDays").value || 0);
  const h = parseInt(document.getElementById("expireHours").value || 0);
  const m = parseInt(document.getElementById("expireMinutes").value || 0);

  if(d === 0 && h === 0 && m === 0){
    await db.collection("shareLinks").doc(id).update({
      expiresAt: null
    });
  }else{
    const future = new Date();
    future.setDate(future.getDate() + d);
    future.setHours(future.getHours() + h);
    future.setMinutes(future.getMinutes() + m);

    await db.collection("shareLinks").doc(id).update({
      expiresAt: firebase.firestore.Timestamp.fromDate(future)
    });
  }

  closeExpireBox();
  loadLinks();
}

  btn.style.color = "white";

  setTimeout(()=>{

}

function startRename(id){
  const el = document.getElementById("name-" + id);
  if(!el || el.querySelector("input")) return;

  const oldText = el.innerText;
  const input = document.createElement("input");

  input.type = "text";
  input.value = oldText;
  input.style.width = "100%";
  input.style.background = "transparent";
  input.style.color = "inherit";
  input.style.border = "1px solid rgba(255,255,255,0.3)";
  input.style.borderRadius = "6px";
  input.style.padding = "4px 6px";
  input.style.fontSize = "14px";

  el.innerHTML = "";
  el.appendChild(input);
  input.focus();
  input.select();

  function finish(){
    const val = input.value.trim();
    el.innerText = val || oldText;

    if(val){
      // ✅ GIỮ TÊN KỂ CẢ ĐÓNG TAB
      localStorage.setItem("alias_" + id, val);
    }
  }

  input.addEventListener("blur", finish);
  input.addEventListener("keydown", e=>{
    if(e.key === "Enter") input.blur();
    if(e.key === "Escape") el.innerText = oldText;
  });
}

function toggleAdmin(){

  const content = document.getElementById("adminContent");
  const toggleBtn = document.getElementById("adminToggle");
  const createBtn = document.querySelector(".create-link-btn");

  if(!content) return;

  const isOpen = content.classList.contains("open");

  if(isOpen){
    content.classList.remove("open");
    toggleBtn?.classList.remove("active");
    createBtn?.classList.remove("show");
  } else {
    content.classList.add("open");
    toggleBtn?.classList.add("active");
    createBtn?.classList.add("show");
  }

}

  document.querySelectorAll("[data-i18n-placeholder]").forEach(el=>{

}

function getModelName(code){

  code = code.toUpperCase();

  if(!CODE_CACHE.size) return code;

  for(const [key,items] of CODE_CACHE){

    for(const d of items){

      let models = "";

      if(Array.isArray(d.models)){
        models = d.models.map(m=>{
          if(typeof m==="string") return m;
          if(typeof m==="object")
            return (m.brand||"")+" "+(m.model||"");
          return "";
        }).join(" ");
      }
      else if(d.model){
        models = d.model;
      }

      models = models.toUpperCase();

      if(models.includes(code)){
        return models + " ("+code+")";
      }

    }

  }

  return code;

}

function getSamsungName(code){

  code = code.toUpperCase();

  const list = CODE_CACHE.get(code);

  if(!list) return null;

  const d = list[0];

  if(!d.models) return code;

  const m = d.models[0];

  if(typeof m === "object")
    return (m.brand || "") + " " + (m.model || "") + " ("+code+")";

  if(typeof m === "string")
    return m + " ("+code+")";

  return code;

}
